<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopefulHands | Donation Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- html2pdf for invoice generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(145deg, #2c0b3a 0%, #1e0428 100%); color: #f5eedc; padding: 0 20px 60px; }
        .app-container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 28px 0 20px; border-bottom: 3px solid #f5b81b; margin-bottom: 35px; }
        .logo-area h1 { font-size: 1.9rem; font-weight: 700; background: linear-gradient(135deg, #FFD966, #FFB347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-area p { font-size: 0.85rem; color: #e0cba0; }
        .search-bar { display: flex; background: #3b1a48; border-radius: 60px; overflow: hidden; border: 1px solid #d4af37; }
        .search-bar input { padding: 12px 20px; width: 260px; background: transparent; color: #fff3e0; outline: none; border: none; }
        .search-bar button { background: #d4af37; border: none; padding: 0 20px; cursor: pointer; color: #2c0b3a; font-weight: bold; }
        .cart-icon { position: relative; background: #46235b; padding: 10px 16px; border-radius: 50px; border: 1px solid #f5b81b; cursor: pointer; }
        .cart-icon i { color: #FFD966; font-size: 1.5rem; }
        .cart-count { position: absolute; top: -6px; right: -6px; background: #ffb347; color: #2c0b3a; font-size: 0.7rem; font-weight: bold; border-radius: 30px; padding: 2px 8px; }
        .main-layout { display: flex; flex-wrap: wrap; gap: 35px; }
        .products-grid { flex: 2.5; min-width: 280px; }
        .sidebar { flex: 1.2; min-width: 260px; background: #341244c9; border-radius: 32px; padding: 22px 18px; border: 1px solid #ffd96666; height: fit-content; }
        .section-title { font-size: 1.6rem; font-weight: 600; border-left: 6px solid #f5b81b; padding-left: 16px; margin-bottom: 28px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 28px; }
        .product-card { background: #251b30e0; border-radius: 28px; overflow: hidden; transition: transform 0.25s; border: 1px solid #b8860b80; }
        .product-card:hover { transform: translateY(-6px); border-color: #f5b81b; }
        .product-image-section { padding: 16px; background: #1f102b; }
        .main-product-img { width: 100%; height: 220px; object-fit: cover; border-radius: 20px; border: 2px solid #d4af37; }
        .thumbnail-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
        .thumbnail { width: 55px; height: 55px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.1s; }
        .thumbnail:hover { border-color: #f5b81b; transform: scale(1.05); }
        .product-info { padding: 18px 16px 20px; }
        .product-title { font-size: 1.3rem; font-weight: 700; color: #FFE6A3; }
        .product-price { font-size: 1.5rem; font-weight: 800; color: #ffcd7e; margin: 10px 0 8px; }
        .product-desc { font-size: 0.85rem; color: #e2cfb3; line-height: 1.4; margin-bottom: 12px; }
        .detail-text { font-size: 0.75rem; color: #c6ab7a; margin: 8px 0; border-top: 1px dashed #6a3e8a; padding-top: 8px; }
        .add-to-cart { background: linear-gradient(95deg, #d4af37, #f5b81b); border: none; width: 100%; padding: 12px 0; font-weight: bold; border-radius: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: #2c0a3a; }
        .shipping-card, .cart-mini { background: #271d33; border-radius: 28px; padding: 18px; margin-bottom: 25px; }
        .cart-items-list { max-height: 250px; overflow-y: auto; margin-bottom: 15px; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #55416e; font-size: 0.85rem; }
        .cart-total { font-weight: bold; font-size: 1.2rem; margin: 12px 0; text-align: right; }
        .checkout-btn, .invoice-btn { width: 100%; background: #c8a82b; border: none; padding: 12px; border-radius: 40px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .invoice-btn { background: #6a3e8a; color: #ffecb3; }
        .remove-item-btn { background: #c0392b; border: none; color: white; border-radius: 40px; padding: 2px 10px; margin-left: 6px; cursor: pointer; }
        @media (max-width: 800px) { .header { flex-direction: column; gap: 16px; } }
        footer { text-align: center; margin-top: 55px; padding: 24px; color: #cbb879; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area"><h1><i class="fas fa-hand-holding-heart"></i> HopefulHands</h1><p>every donated item changes a life</p></div>
        <div class="search-bar"><input type="text" id="searchInput" placeholder="Search items..."><button id="searchBtn"><i class="fas fa-search"></i></button></div>
        <div class="cart-icon"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCountBadge">0</span></div>
    </div>
    <div class="main-layout">
        <div class="products-grid"><div class="section-title"><i class="fas fa-box-open"></i> Donated treasures</div><div class="grid-container" id="productsContainer"></div></div>
        <div class="sidebar">
            <div class="shipping-card"><h3><i class="fas fa-truck-fast"></i> Shipping</h3><div class="input-group"><input type="text" id="zipCode" placeholder="ZIP code"><button id="calcShipBtn">Calculate</button></div><div id="shippingResult">💡 Enter ZIP to see cost</div></div>
            <div class="cart-mini"><h3><i class="fas fa-bag-shopping"></i> Cart</h3><div id="cartItemsList"><div class="empty-cart">Your cart is empty ✨</div></div><div class="cart-total" id="cartTotalDisplay">$0.00</div><button class="checkout-btn" id="checkoutBtn"><i class="fas fa-donate"></i> Generate Invoice & Email</button><button class="invoice-btn" id="pdfOnlyBtn"><i class="fas fa-file-pdf"></i> Download PDF Invoice</button></div>
        </div>
    </div>
    <footer><i class="fas fa-heart" style="color:#f5b81b;"></i> HopefulHands Nonprofit — invoice automatically sent to your email</footer>
</div>

<script>
    // ---------- PRODUCTS WITH MULTIPLE IMAGES + RICH DESCRIPTION ----------
    const productsData = [
        { id:1, name:"Vintage Ceramic Lamp", price:24.99, category:"home",
          description:"A stunning hand-painted ceramic lamp with floral motifs. Perfect for cozy evenings.",
          condition:"Excellent (minor wear on base)", dimensions:"12\" tall x 6\" wide", donor:"Donated by Maple Street Community",
          images:["https://picsum.photos/id/26/400/300","https://picsum.photos/id/107/400/300","https://picsum.photos/id/20/400/300"] },
        { id:2, name:"Handcrafted Wooden Bowl", price:18.50, category:"kitchen",
          description:"Reclaimed oak wood bowl, hand-carved by local artisans. Food-safe finish.",
          condition:"Like New", dimensions:"10\" diameter, 4\" depth", donor:"Donated by GreenWood Collective",
          images:["https://picsum.photos/id/127/400/300","https://picsum.photos/id/128/400/300"] },
        { id:3, name:"Cozy Knit Blanket", price:32.00, category:"home",
          description:"Chunky hand-knit blanket in burgundy & cream. Ultra-soft acrylic blend.",
          condition:"Gently used, no stains", dimensions:"50\"x60\"", donor:"Donated by Warm Hearts Charity",
          images:["https://picsum.photos/id/96/400/300","https://picsum.photos/id/95/400/300","https://picsum.photos/id/28/400/300"] },
        { id:4, name:"Classic Novel Set (3 books)", price:12.75, category:"media",
          description:"Hemingway, Fitzgerald & Morrison. Vintage paperbacks with timeless stories.",
          condition:"Good (some creases)", dimensions:"Paperback standard", donor:"Donated by Book Lovers United",
          images:["https://picsum.photos/id/0/400/300","https://picsum.photos/id/1/400/300"] }
    ];

    let cart = [];
    let currentSearchTerm = '';

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        let filtered = productsData.filter(p => p.name.toLowerCase().includes(currentSearchTerm) || p.description.toLowerCase().includes(currentSearchTerm));
        if(filtered.length===0){ container.innerHTML='<div style="grid-column:1/-1; text-align:center; padding:60px;">No items match</div>'; return; }
        let html='';
        filtered.forEach(p => {
            let mainImg = p.images[0] || "https://picsum.photos/id/13/400/300";
            let thumbnailsHtml = p.images.map((img, idx) => `<img class="thumbnail" src="${img}" onclick="changeMainImage(${p.id}, ${idx})" data-idx="${idx}">`).join('');
            html+=`<div class="product-card" data-id="${p.id}"><div class="product-image-section"><img class="main-product-img" id="mainImg-${p.id}" src="${mainImg}" alt="${p.name}"><div class="thumbnail-row">${thumbnailsHtml}</div></div><div class="product-info"><div class="product-title">${escapeHtml(p.name)}</div><div class="product-price">$${p.price.toFixed(2)}</div><div class="product-desc">${escapeHtml(p.description)}</div><div class="detail-text"><i class="fas fa-clipboard-list"></i> Condition: ${escapeHtml(p.condition)}<br><i class="fas fa-ruler"></i> Dimensions: ${escapeHtml(p.dimensions)}<br><i class="fas fa-hand-holding-heart"></i> Donor: ${escapeHtml(p.donor)}</div><button class="add-to-cart" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-price="${p.price}"><i class="fas fa-cart-plus"></i> Add to cart</button></div></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', (e) => { let id=parseInt(btn.dataset.id), name=btn.dataset.name, price=parseFloat(btn.dataset.price); addToCart({id,name,price}); }));
    }

    window.changeMainImage = function(productId, imgIndex) {
        let product = productsData.find(p=>p.id===productId);
        if(product && product.images[imgIndex]){ let imgElem = document.getElementById(`mainImg-${productId}`); if(imgElem) imgElem.src = product.images[imgIndex]; }
    };

    function addToCart(product){ let existing = cart.find(i=>i.id===product.id); if(existing) existing.quantity+=1; else cart.push({...product, quantity:1}); updateCartUI(); saveCart(); }

    function removeFromCart(id){ let idx = cart.findIndex(i=>i.id===id); if(idx!==-1){ if(cart[idx].quantity>1) cart[idx].quantity--; else cart.splice(idx,1); updateCartUI(); saveCart(); } }

    function updateCartUI(){ let container = document.getElementById('cartItemsList'), totalSpan = document.getElementById('cartTotalDisplay'), badge = document.getElementById('cartCountBadge'); if(!container) return; if(cart.length===0){ container.innerHTML='<div class="empty-cart">Your cart is empty ✨</div>'; totalSpan.innerText='$0.00'; badge.innerText='0'; return; }
        let totalItems=0, totalPrice=0, html='';
        cart.forEach(item=>{ let tot=item.price*item.quantity; totalItems+=item.quantity; totalPrice+=tot; html+=`<div class="cart-item"><span><strong>${escapeHtml(item.name)}</strong> x${item.quantity}</span><span>$${tot.toFixed(2)} <button class="remove-item-btn" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button></span></div>`; });
        container.innerHTML=html; totalSpan.innerText=`$${totalPrice.toFixed(2)}`; badge.innerText=totalItems;
        document.querySelectorAll('.remove-item-btn').forEach(btn=>btn.addEventListener('click',()=>removeFromCart(parseInt(btn.dataset.id))));
    }

    function saveCart(){ localStorage.setItem('hopeful_cart', JSON.stringify(cart)); }
    function loadCart(){ let saved = localStorage.getItem('hopeful_cart'); if(saved) { cart = JSON.parse(saved); updateCartUI(); } }

    // INVOICE GENERATION + EMAIL (opens email client with pre-filled invoice)
    function generateInvoiceHTML() {
        let subtotal = cart.reduce((s,i)=>s+(i.price*i.quantity),0);
        let shipping = 5.99;
        let total = subtotal + shipping;
        let itemsRows = cart.map(i=>`<tr><td>${escapeHtml(i.name)}</td><td>${i.quantity}</td><td>$${i.price.toFixed(2)}</td><td>$${(i.price*i.quantity).toFixed(2)}</td></tr>`).join('');
        return `<!DOCTYPE html><html><head><title>HopefulHands Invoice</title><style>body{font-family:sans-serif;padding:30px;background:#f5f0e8;} .invoice{max-width:600px;margin:auto;background:white;border-radius:20px;padding:30px;border-left:8px solid #d4af37;} .total{font-size:1.4rem;font-weight:bold;} </style></head><body><div class='invoice'><h2 style='color:#4B0082;'>HopefulHands Nonprofit</h2><p>Thank you for your donation purchase!</p><table border='1' cellpadding='8' style='width:100%;border-collapse:collapse;'><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Total</th></tr></thead><tbody>${itemsRows}</tbody><tfoot><tr><td colspan='3'><strong>Subtotal</strong></td><td>$${subtotal.toFixed(2)}</td></tr><tr><td colspan='3'>Shipping estimate</td><td>$${shipping.toFixed(2)}</td></tr><tr><td colspan='3'><strong>Total Donation</strong></td><td><strong>$${total.toFixed(2)}</strong></td></tr></tfoot></table><p><i class='fas fa-heart'></i> 100% proceeds go to community aid. Order date: ${new Date().toLocaleString()}</p><br><p>HopefulHands · nonprofit marketplace</p></div></body></html>`;
    }

    function downloadPDFInvoice() {
        if(cart.length===0){ alert("Cart is empty. Add items first."); return; }
        let invoiceHtml = generateInvoiceHTML();
        let element = document.createElement('div');
        element.innerHTML = invoiceHtml;
        let opt = { margin: [0.5,0.5,0.5,0.5], filename: `HopefulHands_Invoice_${Date.now()}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save();
    }

    function generateEmailInvoiceAndSend() {
        if(cart.length===0){ alert("Cart is empty. Add items before invoice."); return; }
        let invoiceHtml = generateInvoiceHTML();
        let emailBody = encodeURIComponent(invoiceHtml);
        let mailtoLink = `mailto:youremail@example.com?subject=HopefulHands Donation Invoice&body=${emailBody}`;
        window.location.href = mailtoLink;
        alert("Your email client will open. Replace 'youremail@example.com' with your actual email address and send. (For fully automatic email, see instructions below)");
        downloadPDFInvoice(); // also downloads pdf as backup
    }

    function setupCheckoutAndEmail() {
        document.getElementById('checkoutBtn').addEventListener('click', generateEmailInvoiceAndSend);
        document.getElementById('pdfOnlyBtn').addEventListener('click', downloadPDFInvoice);
    }

    function shippingHandler() {
        const btn = document.getElementById('calcShipBtn');
        const zipInput = document.getElementById('zipCode');
        const resultDiv = document.getElementById('shippingResult');
        btn.addEventListener('click', () => { let zip = zipInput.value.trim(); if(zip) resultDiv.innerHTML = `<i class="fas fa-truck"></i> Estimated shipping: $5.99 (Flat rate nonprofit shipping)`; else resultDiv.innerHTML = "Please enter a ZIP"; });
    }

    function initSearch() { document.getElementById('searchBtn').addEventListener('click',()=>{ currentSearchTerm = document.getElementById('searchInput').value.toLowerCase(); renderProducts(); }); }

    document.addEventListener('DOMContentLoaded', () => { loadCart(); renderProducts(); shippingHandler(); initSearch(); setupCheckoutAndEmail(); });
</script>
</body>
</html>
