<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopefulHands | Donation Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #2c0b3a 0%, #1e0428 100%);
            color: #f5eedc;
            padding: 0 20px 60px;
        }

        .nav-buttons {
    display: flex;
    gap: 12px;
    align-items: center;
}

.nav-btn {
    background: #1a2a4f;
    padding: 10px 20px;
    border-radius: 50px;
    border: 1px solid #f5b81b;
    color: #FFD966;
    text-decoration: none;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.2s;
}

.nav-btn:hover {
    background: #0f1e3a;
    transform: scale(1.02);
}

.member-btn {
    background: #0d2b4e;
}
        
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 28px 0 20px;
            border-bottom: 3px solid #f5b81b;
            margin-bottom: 35px;
        }

        .logo-area h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-area p {
            font-size: 0.85rem;
            color: #e0cba0;
        }

        .search-bar {
            display: flex;
            background: #3b1a48;
            border-radius: 60px;
            overflow: hidden;
            border: 1px solid #d4af37;
        }

        .search-bar input {
            padding: 12px 20px;
            width: 260px;
            background: transparent;
            color: #fff3e0;
            outline: none;
            border: none;
        }

        .search-bar button {
            background: #d4af37;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            color: #2c0b3a;
            font-weight: bold;
        }

        .cart-icon {
            position: relative;
            background: #46235b;
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid #f5b81b;
            cursor: pointer;
        }

        .cart-icon i {
            color: #FFD966;
            font-size: 1.5rem;
        }

        .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ffb347;
            color: #2c0b3a;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 30px;
            padding: 2px 8px;
        }

        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 35px;
        }

        .products-grid {
            flex: 2.5;
            min-width: 280px;
        }

        .sidebar {
            flex: 1.2;
            min-width: 260px;
            background: #341244c9;
            border-radius: 32px;
            padding: 22px 18px;
            border: 1px solid #ffd96666;
            height: fit-content;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            border-left: 6px solid #f5b81b;
            padding-left: 16px;
            margin-bottom: 28px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
        }

        .product-card {
            background: #251b30e0;
            border-radius: 28px;
            overflow: hidden;
            transition: transform 0.25s;
            border: 1px solid #b8860b80;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: #f5b81b;
        }

        .product-img {
            background: #1f102b;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #e5c875;
        }

        .product-info {
            padding: 18px 16px 20px;
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #FFE6A3;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffcd7e;
            margin: 10px 0 8px;
        }

        .product-desc {
            font-size: 0.85rem;
            color: #e2cfb3;
            margin-bottom: 18px;
        }

        .add-to-cart {
            background: linear-gradient(95deg, #d4af37, #f5b81b);
            border: none;
            width: 100%;
            padding: 12px 0;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #2c0a3a;
        }

        .shipping-card, .cart-mini {
            background: #271d33;
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .input-group input {
            flex: 2;
            padding: 10px;
            border-radius: 40px;
            border: none;
            background: #3d274b;
            color: white;
        }

        .input-group button {
            background: #d4af37;
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
        }

        #shippingResult {
            background: #1f0e2a;
            border-radius: 20px;
            padding: 12px;
            margin-top: 10px;
        }

        .cart-items-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #55416e;
        }

        .cart-total {
            font-weight: bold;
            font-size: 1.2rem;
            margin: 12px 0;
            text-align: right;
        }

        .checkout-btn {
            width: 100%;
            background: #c8a82b;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .remove-item-btn {
            background: #c0392b;
            border: none;
            color: white;
            border-radius: 40px;
            padding: 2px 10px;
            margin-left: 6px;
            cursor: pointer;
        }

        /* Lightbox for enlarging images */
.lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 9999;
    cursor: pointer;
    justify-content: center;
    align-items: center;
}

.lightbox.active {
    display: flex;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    border-radius: 12px;
    border: 3px solid #d4af37;
}

.lightbox-close {
    position: absolute;
    top: 20px;
    right: 40px;
    color: #d4af37;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.lightbox-close:hover {
    color: #ffcd4a;
    transform: scale(1.1);
}

.product-img {
    background: #1f102b;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    color: #e5c875;
    cursor: pointer;
    transition: 0.2s;
}

.product-img:hover {
    opacity: 0.8;
}  
        
        footer {
            text-align: center;
            margin-top: 55px;
            padding: 24px;
            color: #cbb879;
        }

        @media (max-width: 800px) {
            .header {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Lightbox for image popup -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="" alt="Enlarged view">
</div>
<div class="app-container">
<div class="header">
    <div class="logo-area">
        <h1><i class="fas fa-hand-holding-heart"></i> HopefulHands</h1>
        <p>Every Purchase Changes A Life · Nonprofit Marketplace</p>
    </div>
    
    <div class="nav-buttons">
        <a href="index.html" class="nav-btn home-btn">
            <i class="fas fa-home"></i> Home
        </a>
        <a href="membership.html" class="nav-btn member-btn">
            <i class="fas fa-user-plus"></i> Become a Member
        </a>
    </div>
    
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search for donated goods...">
        <button id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
    
    <div class="main-layout">
        <div class="products-grid">
            <div class="section-title"><i class="fas fa-box-open"></i> Donated treasures</div>
            <div class="grid-container" id="productsContainer"></div>
        </div>

        <div class="sidebar">
            <div class="shipping-card">
                <h3><i class="fas fa-truck-fast"></i> Shipping estimate</h3>
                <div class="input-group">
                    <input type="text" id="zipCode" placeholder="Enter ZIP code">
                    <button id="calcShipBtn">Calculate</button>
                </div>
                <div id="shippingResult">💡 Enter ZIP to see shipping cost</div>
            </div>

            <div class="cart-mini">
                <h3><i class="fas fa-bag-shopping"></i> Your cart</h3>
                <div id="cartItemsList"><div class="empty-cart">Your cart is empty ✨</div></div>
                <div class="cart-total" id="cartTotalDisplay">$0.00</div>
                <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-donate"></i> Checkout</button>
            </div>
        </div>
    </div>
    <footer><i class="fas fa-heart" style="color:#f5b81b;"></i> HopefulHands Nonprofit</footer>
</div>

<script>
    // PRODUCTS
    const productsData = [
        { id: 1, name: "E-bike CyberVelo", price: 899.00, description: "1000w 30mph 40mi range", imageUrl: "assets/items/IMG_4439.jpeg", category: "elrctronics" },
        { id: 2, name: "Kids E-Bike Unbranded", price: 449.00, description: "500w 21mph 18mi range.", imageUrl: "assets/items/IMG_1693.jpeg", category: "electronics" },
        { id: 3, name: "Adult Scooter", price: 560.00, description: "1200w 30mph 40mi range.", imageUrl: "assets/items/IMG_1689.jpeg", category: "electronics" },
        { id: 4, name: "Classic Novel Set", price: .50, description: "Hemingway, Fitzgerald, Morrison.", imageIcon: "fa-book", category: "media" },
        { id: 5, name: "Wireless Earbuds", price: 45.00, description: "Open-box, 10hr battery.", imageIcon: "fa-headphones", category: "electronics" },
        { id: 6, name: "Artisan Coffee Mug", price: 9.99, description: "Purple & gold glaze.", imageIcon: "fa-mug-hot", category: "kitchen" }
    ];

    let cart = [];
    let currentShippingCost = 0;
    let currentSearchTerm = '';  // ← ADD THIS LINE
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateCartUI() {
        const container = document.getElementById('cartItemsList');
        const totalSpan = document.getElementById('cartTotalDisplay');
        if (!container) return;
        if (cart.length === 0) {
            container.innerHTML = '<div class="empty-cart">Your cart is empty ✨</div>';
            totalSpan.innerText = '$0.00';
            return;
        }
        let totalItems = 0, totalPrice = 0, html = '';
        cart.forEach(item => {
            totalItems += item.quantity;
            totalPrice += item.price * item.quantity;
            html += `<div class="cart-item"><span><strong>${escapeHtml(item.name)}</strong> x${item.quantity}</span><span>$${(item.price * item.quantity).toFixed(2)} <button class="remove-item-btn" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button></span></div>`;
        });
        container.innerHTML = html;
        totalSpan.innerText = `$${totalPrice.toFixed(2)}`;
        document.querySelectorAll('.remove-item-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                const idx = cart.findIndex(i => i.id === id);
                if (idx !== -1) {
                    if (cart[idx].quantity > 1) cart[idx].quantity--;
                    else cart.splice(idx, 1);
                    updateCartUI();
                    localStorage.setItem('hopeful_cart', JSON.stringify(cart));
                }
            });
        });
    }

    function addToCart(product) {
        const existing = cart.find(i => i.id === product.id);
        if (existing) existing.quantity++;
        else cart.push({ ...product, quantity: 1 });
        updateCartUI();
        localStorage.setItem('hopeful_cart', JSON.stringify(cart));
        let toast = document.createElement('div');
        toast.innerText = `✨ ${product.name} added to cart`;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#d4af37';
        toast.style.color = '#2c0b3a';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '60px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '9999';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1800);
    }
    function updateCartTotal() {
        const totalSpan = document.getElementById('cartTotalDisplay');
        if (!totalSpan) return;
        
        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const total = subtotal + currentShippingCost;
        
        // Update the display to include shipping
        if (currentShippingCost > 0) {
            totalSpan.innerHTML = `$${total.toFixed(2)} <span style="font-size: 0.7rem; display: block; color: #c6ab7a;">(includes $${currentShippingCost.toFixed(2)} shipping)</span>`;
        } else {
            totalSpan.innerText = `$${total.toFixed(2)}`;
        }
    }
    
   function renderProducts() {
        const container = document.getElementById('productsContainer');
        if (!container) return;
        
        let filtered = [...productsData];
        if (currentSearchTerm.trim() !== '') {
            const term = currentSearchTerm.trim().toLowerCase();
            filtered = productsData.filter(p => p.name.toLowerCase().includes(term) || p.description.toLowerCase().includes(term) || (p.category && p.category.includes(term)));
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; background:#2d1740; border-radius:40px;">🙏 No donated items match "${escapeHtml(currentSearchTerm)}". Please try again.</div>`;
            return;
        }

        let html = '';
        for (let product of filtered) {
            // Check if we have a real image URL
            const imageToShow = product.imageUrl ? product.imageUrl : null;
            const iconToShow = product.imageIcon ? product.imageIcon : 'fa-gift';
            
            html += `
                <div class="product-card" data-id="${product.id}">
                    <div class="product-img" ${imageToShow ? `onclick="openLightbox('${imageToShow}', '${escapeHtml(product.name)}')"` : ''}>
                        ${imageToShow ? 
                            `<img src="${imageToShow}" alt="${escapeHtml(product.name)}" style="width:100%; height:100%; object-fit:cover;">` : 
                            `<i class="fas ${iconToShow} fa-4x"></i>`
                        }
                    </div>
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(product.name)}</div>
                        <div class="product-price">$${product.price.toFixed(2)}</div>
                        <div class="product-desc">${escapeHtml(product.description)}</div>
                        <button class="add-to-cart" data-id="${product.id}" data-name="${escapeHtml(product.name)}" data-price="${product.price}">
                            <i class="fas fa-cart-plus"></i> Add to cart
                        </button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const name = btn.getAttribute('data-name');
                const price = parseFloat(btn.getAttribute('data-price'));
                addToCart({ id, name, price });
            });
        });
    }
function initShipping() {
        const btn = document.getElementById('calcShipBtn');
        const zipInput = document.getElementById('zipCode');
        const resultDiv = document.getElementById('shippingResult');
        
        // Product weights in pounds (UPDATE THESE for your products)
        const productWeights = {
            1: 65,   // 1000w ebike
            2: 40,   // Kids 500w Ebike
            3: 40,   // scooter eoeotwo
            4: .5,   // Classic Novel Set
            5: 0.5, // Wireless Earbuds
            6: 1    // Artisan Coffee Mug
        };
        
        // Your nonprofit's ZIP code - CHANGE THIS
        const YOUR_ZIP = "302703";
        
        function calculateShipping() {
            const zip = zipInput.value.trim();
            
            if (!zip) {
                resultDiv.innerHTML = "Please enter a ZIP code";
                currentShippingCost = 0;
                updateCartTotal();
                return;
            }
            
            if (cart.length === 0) {
                resultDiv.innerHTML = "Add items to cart first";
                currentShippingCost = 0;
                updateCartTotal();
                return;
            }
            
            // Calculate total weight
            let totalWeight = 0;
            cart.forEach(item => {
                const weight = productWeights[item.id] || 1;
                totalWeight += weight * item.quantity;
            });
            
            // Base rate + weight charge
            let shipping = 4.99 + (totalWeight * 0.75);
            
            // Calculate distance-based zone
            const yourArea = parseInt(YOUR_ZIP.substring(0, 3));
            const theirArea = parseInt(zip.substring(0, 3));
            const distance = Math.abs(yourArea - theirArea);
            
            // Add distance fee
            if (distance > 500) {
                shipping += 4.00;
            } else if (distance > 200) {
                shipping += 2.00;
            } else if (distance > 50) {
                shipping += 1.00;
            }
            
            // Remote area surcharge
            if (zip.startsWith('967') || zip.startsWith('968') || 
                zip.startsWith('995') || zip.startsWith('996') || 
                zip.startsWith('997') || zip.startsWith('998') || 
                zip.startsWith('999') || zip.startsWith('006')) {
                shipping += 5.00;
            }
            
            // Cap at maximum
            shipping = Math.min(shipping, 100.00);
            shipping = parseFloat(shipping.toFixed(2));
            
            // SAVE the shipping cost globally
            currentShippingCost = shipping;
            
            // Display result
            let distanceText = "";
            if (distance > 500) distanceText = " (long distance)";
            else if (distance > 200) distanceText = " (medium distance)";
            else if (distance > 50) distanceText = " (regional)";
            else distanceText = " (local)";
            
            resultDiv.innerHTML = `<i class="fas fa-truck"></i> Shipping: $${shipping} (${totalWeight.toFixed(1)} lbs${distanceText})`;
            
            // Update the checkout total with shipping
            updateCartTotal();
        }
        
        if (btn) {
            btn.addEventListener('click', calculateShipping);
            zipInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') calculateShipping();
            });
        }
    }

        function initSearch() {
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        
        if (searchBtn) {
            searchBtn.addEventListener('click', () => {
                const term = searchInput.value.toLowerCase();
                const container = document.getElementById('productsContainer');
                let html = '';
                const filtered = productsData.filter(p => 
                    p.name.toLowerCase().includes(term) || 
                    p.description.toLowerCase().includes(term)
                );
                
                if (filtered.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:60px;">No items found</div>';
                    return;
                }
                
                filtered.forEach(product => {
                    html += `<div class="product-card">
                        <div class="product-img"><i class="fas ${product.imageIcon} fa-4x"></i></div>
                        <div class="product-info">
                            <div class="product-title">${escapeHtml(product.name)}</div>
                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <div class="product-desc">${escapeHtml(product.description)}</div>
                            <button class="add-to-cart" data-id="${product.id}" data-name="${escapeHtml(product.name)}" data-price="${product.price}">
                                <i class="fas fa-cart-plus"></i> Add to cart
                            </button>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
                
                document.querySelectorAll('.add-to-cart').forEach(btn => {
                    btn.addEventListener('click', () => {
                        addToCart({
                            id: parseInt(btn.dataset.id),
                            name: btn.dataset.name,
                            price: parseFloat(btn.dataset.price)
                        });
                    });
                });
            });
        }
        
        if (searchInput) {
            searchInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    searchBtn.click();
                }
            });
        }
    }

        function initCheckout() {
        const checkoutBtn = document.getElementById('checkoutBtn');
        if (checkoutBtn) {
            checkoutBtn.addEventListener('click', async () => {
                if (cart.length === 0) {
                    alert("Your cart is empty! Add some items first.");
                    return;
                }
                
                // Ask for email (required for shipping confirmation)
                const customerEmail = prompt("Please enter your email address to receive order confirmation:", "");
                if (!customerEmail || !customerEmail.includes('@')) {
                    alert("A valid email address is required.");
                    return;
                }
                
                // Get shipping cost from your existing calculation
                let shippingCost = currentShippingCost;
                if (shippingCost === 0 && cart.length > 0) {
                    shippingCost = 5.99;
                }
                
                // Show loading state
                checkoutBtn.disabled = true;
                checkoutBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Redirecting to secure checkout...';
                
                try {
                    // Call your Netlify function
                    const response = await fetch('/.netlify/functions/create-checkout', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            items: cart.map(item => ({
                                id: item.id,
                                name: item.name,
                                price: item.price,
                                quantity: item.quantity
                            })),
                            shippingCost: shippingCost,
                            customerEmail: customerEmail
                        }),
                    });
                    
                    const data = await response.json();
                    
                    if (data.url) {
                        // Clear cart before redirecting
                        localStorage.removeItem('hopeful_cart');
                        // Redirect to Stripe Checkout
                        window.location.href = data.url;
                    } else {
                        throw new Error('No checkout URL received');
                    }
                } catch (error) {
                    console.error('Checkout error:', error);
                    alert('Unable to start checkout. Please try again.');
                    checkoutBtn.disabled = false;
                    checkoutBtn.innerHTML = '<i class="fas fa-donate"></i> Proceed to Checkout';
                }
            });
        }
    }

        // Lightbox functions
    function openLightbox(imageUrl, productName) {
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        if (lightbox && lightboxImg && imageUrl) {
            lightboxImg.src = imageUrl;
            lightboxImg.alt = productName;
            lightbox.classList.add('active');
        }
    }
    
    function closeLightbox() {
        const lightbox = document.getElementById('lightbox');
        if (lightbox) {
            lightbox.classList.remove('active');
        }
    }
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeLightbox();
        }
    });
    
    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('hopeful_cart');
        if (saved) { cart = JSON.parse(saved); updateCartUI(); }
        renderProducts();
        initShipping();
        initSearch();
        initCheckout();
    });
</script>
</body>
</html>
