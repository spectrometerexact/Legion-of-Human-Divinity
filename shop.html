<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopefulHands | Donation Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <h1><i class="fas fa-hand-holding-heart"></i> HopefulHands</h1>
            <p>every donated item changes a life</p>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search items...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
        <div class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count" id="cartCountBadge">0</span>
        </div>
    </div>

    <div class="main-layout">
        <div class="products-grid">
            <div class="section-title"><i class="fas fa-box-open"></i> Donated treasures</div>
            <div class="grid-container" id="productsContainer"></div>
        </div>

        <div class="sidebar">
            <div class="shipping-card">
                <h3><i class="fas fa-truck-fast"></i> Shipping</h3>
                <div class="input-group">
                    <input type="text" id="zipCode" placeholder="ZIP code">
                    <button id="calcShipBtn">Calculate</button>
                </div>
                <div id="shippingResult">💡 Enter ZIP to see cost</div>
            </div>

            <div class="cart-mini">
                <h3><i class="fas fa-bag-shopping"></i> Cart</h3>
                <div id="cartItemsList"><div class="empty-cart">Your cart is empty ✨</div></div>
                <div class="cart-total" id="cartTotalDisplay">$0.00</div>
                <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-donate"></i> Generate Invoice & Email</button>
                <button class="invoice-btn" id="pdfOnlyBtn"><i class="fas fa-file-pdf"></i> Download PDF Invoice</button>
            </div>
        </div>
    </div>
    <footer><i class="fas fa-heart" style="color:#f5b81b;"></i> HopefulHands Nonprofit</footer>
</div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/shipping.js"></script>
<script src="js/invoice.js"></script>
<script src="js/main.js"></script>
</body>
</html>
