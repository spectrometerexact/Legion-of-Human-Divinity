<script>
    // ============================================
    // PRODUCTS DATA - EDIT YOUR ITEMS HERE
    // ============================================
    const productsData = [
        {
            id: 1,
            name: "Vintage Ceramic Lamp",
            price: 24.99,
            description: "Hand-painted floral base, warm glow, perfect for cozy corners.",
            imageIcon: "fa-lamp",
            category: "home"
        },
        {
            id: 2,
            name: "Handcrafted Wooden Bowl",
            price: 18.50,
            description: "Carved from reclaimed oak, fair-trade donated piece.",
            imageIcon: "fa-utensils",
            category: "kitchen"
        },
        {
            id: 3,
            name: "Cozy Knit Blanket",
            price: 32.00,
            description: "Chunky knit, rich burgundy and cream, like new.",
            imageIcon: "fa-blanket",
            category: "home"
        },
        {
            id: 4,
            name: "Classic Novel Set (3 books)",
            price: 12.75,
            description: "Hemingway, Fitzgerald, Morrison – gently used.",
            imageIcon: "fa-book",
            category: "media"
        },
        {
            id: 5,
            name: "Wireless Earbuds",
            price: 45.00,
            description: "Open-box, 10hr battery, perfect for donors on the go.",
            imageIcon: "fa-headphones",
            category: "electronics"
        },
        {
            id: 6,
            name: "Artisan Coffee Mug",
            price: 9.99,
            description: "Purple & gold glaze, handmade pottery donation.",
            imageIcon: "fa-mug-hot",
            category: "kitchen"
        }
    ];

    // Cart state
    let cart = [];

    // Helper functions
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(msg, bgColor) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bgColor;
        toast.style.color = '#2c0b3a';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '60px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '9999';
        toast.style.boxShadow = '0 8px 20px black';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1800);
    }

    // Cart functions
    function updateCartUI() {
        const cartContainer = document.getElementById('cartItemsList');
        const cartTotalSpan = document.getElementById('cartTotalDisplay');
        const badge = document.getElementById('cartCountBadge');

        if (!cartContainer) return;

        if (cart.length === 0) {
            cartContainer.innerHTML = '<div class="empty-cart">Your cart is empty ✨</div>';
            cartTotalSpan.innerText = '$0.00';
            if(badge) badge.innerText = '0';
            return;
        }

        let totalItems = 0;
        let totalPrice = 0;
        let cartHtml = '';

        for (let i = 0; i < cart.length; i++) {
            const item = cart[i];
            const itemTotal = item.price * item.quantity;
            totalItems += item.quantity;
            totalPrice += itemTotal;
            cartHtml += `
                <div class="cart-item">
                    <span><strong>${escapeHtml(item.name)}</strong> x${item.quantity}</span>
                    <span>$${itemTotal.toFixed(2)} 
                        <button class="remove-item-btn" data-id="${item.id}" style="background:#c0392b; border:none; color:white; border-radius:40px; padding:2px 10px; margin-left:6px; font-size:11px;"><i class="fas fa-trash-alt"></i></button>
                    </span>
                </div>
            `;
        }

        cartContainer.innerHTML = cartHtml;
        cartTotalSpan.innerText = `$${totalPrice.toFixed(2)}`;
        if(badge) badge.innerText = totalItems;

        document.querySelectorAll('.remove-item-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                removeFromCart(id);
            });
        });
    }

    function removeFromCart(productId) {
        const index = cart.findIndex(item => item.id === productId);
        if (index !== -1) {
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1;
            } else {
                cart.splice(index, 1);
            }
            updateCartUI();
            saveCartToLocal();
        }
    }

    function addToCart(product) {
        const existing = cart.find(item => item.id === product.id);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                quantity: 1
            });
        }
        updateCartUI();
        saveCartToLocal();
        showToast(`✨ ${product.name} added to cart`, '#d4af37');
    }

    function saveCartToLocal() {
        localStorage.setItem('hopeful_cart', JSON.stringify(cart));
    }

    function loadCartFromLocal() {
        const saved = localStorage.getItem('hopeful_cart');
        if (saved) {
            try {
                cart = JSON.parse(saved);
                updateCartUI();
            } catch(e) { console.warn(e); }
        }
    }

    // Render products
    let currentSearchTerm = '';

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        if (!container) return;
        
        let filtered = [...productsData];
        if (currentSearchTerm.trim() !== '') {
            const term = currentSearchTerm.trim().toLowerCase();
            filtered = productsData.filter(p => p.name.toLowerCase().includes(term) || p.description.toLowerCase().includes(term) || p.category.includes(term));
        }

        if (filtered.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; background:#2d1740; border-radius:40px;">🙏 No donated items match "${escapeHtml(currentSearchTerm)}". Please try again.</div>`;
            return;
        }

        let html = '';
        for (let product of filtered) {
            let iconClass = product.imageIcon || 'fa-gift';
            html += `
                <div class="product-card" data-id="${product.id}">
                    <div class="product-img">
                        <i class="fas ${iconClass} fa-4x"></i>
                    </div>
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(product.name)}</div>
                        <div class="product-price">$${product.price.toFixed(2)}</div>
                        <div class="product-desc">${escapeHtml(product.description)}</div>
                        <button class="add-to-cart" data-id="${product.id}" data-name="${escapeHtml(product.name)}" data-price="${product.price}">
                            <i class="fas fa-cart-plus"></i> Add to cart
                        </button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const name = btn.getAttribute('data-name');
                const price = parseFloat(btn.getAttribute('data-price'));
                addToCart({ id, name, price });
            });
        });
    }

    // SIMPLE SHIPPING CALCULATOR (Works 100%)
    function calculateShipping(zip) {
        if (!zip || zip.trim().length < 3) {
            return { valid: false, message: "📦 Please enter a valid ZIP code." };
        }
        // Simple flat rate shipping
        let cost = 5.99;
        let message = `🚚 Estimated shipping: $${cost.toFixed(2)} (standard shipping)`;
        return { valid: true, cost: cost, message: message };
    }

    function initShipping() {
        const calcBtn = document.getElementById('calcShipBtn');
        const zipInput = document.getElementById('zipCode');
        const resultDiv = document.getElementById('shippingResult');

        if (!calcBtn) return;

        function updateShip() {
            const zip = zipInput.value;
            const res = calculateShipping(zip);
            if (res.valid) {
                resultDiv.innerHTML = `<i class="fas fa-shipping-fast"></i> ${res.message}`;
                resultDiv.style.color = "#ffefbf";
            } else {
                resultDiv.innerHTML = `<i class="fas fa-map-marked-alt"></i> ${res.message}`;
            }
        }

        calcBtn.addEventListener('click', updateShip);
        zipInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') updateShip();
        });
        resultDiv.innerHTML = `💜 Enter ZIP to see shipping cost`;
    }

    function initSearch() {
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        function performSearch() {
            currentSearchTerm = searchInput.value;
            renderProducts();
        }
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    }

    function initCheckout() {
        const checkoutBtn = document.getElementById('checkoutBtn');
        checkoutBtn.addEventListener('click', () => {
            if (cart.length === 0) {
                showToast("💛 Your cart is empty! Add some donated items first.", "#b8860b");
            } else {
                const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0).toFixed(2);
                alert(`💜 Nonprofit donation checkout \nTotal: $${total}\n\nThank you for your support!`);
            }
        });
    }

    // Initialize everything
    document.addEventListener('DOMContentLoaded', () => {
        loadCartFromLocal();
        renderProducts();
        initShipping();
        initSearch();
        initCheckout();
        
        const cartIcon = document.getElementById('cartIconTrigger');
        if(cartIcon) {
            cartIcon.addEventListener('click', () => {
                showToast("🛒 Your cart is on the right sidebar!", "#efcd73");
            });
        }
    });
</script>
